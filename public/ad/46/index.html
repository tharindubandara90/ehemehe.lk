<script id="ehm-mobile-viewport-fix">
(function () {
  var nav = navigator || {};
  var ua = nav.userAgent || '';
  var touch = ('ontouchstart' in window) || (nav.maxTouchPoints || 0) > 0;
  var mobileUA = /Android|iPhone|iPad|iPod|Mobile|IEMobile|Opera Mini/i.test(ua);
  var phoneLike = mobileUA || (touch && Math.min(screen.width || 9999, screen.height || 9999) <= 1024);

  if (!phoneLike) return;

  document.documentElement.classList.add('ehm-physical-mobile');

  var viewport = document.querySelector('meta[name="viewport"]');
  if (!viewport) {
    viewport = document.createElement('meta');
    viewport.name = 'viewport';
    document.head.appendChild(viewport);
  }
  viewport.setAttribute(
    'content',
    'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover'
  );

  function correctDesktopViewportScale() {
    var physicalWidth = Math.min(screen.width || innerWidth, screen.height || innerHeight);
    var layoutWidth = document.documentElement.clientWidth || innerWidth;

    // Some iPhone browsers may still expose a ~980px desktop layout viewport.
    // Compensate only in that case.
    if (touch && physicalWidth > 0 && layoutWidth / physicalWidth > 1.35) {
      var ratio = layoutWidth / physicalWidth;
      document.documentElement.style.setProperty('--ehm-mobile-zoom', String(ratio));
      document.documentElement.classList.add('ehm-desktop-viewport-on-phone');
    } else {
      document.documentElement.classList.remove('ehm-desktop-viewport-on-phone');
      document.documentElement.style.removeProperty('--ehm-mobile-zoom');
    }
  }

  document.addEventListener('DOMContentLoaded', correctDesktopViewportScale, { once: true });
  window.addEventListener('load', correctDesktopViewportScale, { once: true });
  window.addEventListener('orientationchange', function () {
    setTimeout(correctDesktopViewportScale, 150);
  });
})();
</script>
